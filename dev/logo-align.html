<!DOCTYPE html>
<html lang="en" class="logo-align">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Logo alignment — marcorei</title>
        <link rel="stylesheet" href="../style.css" />
        <style>
            body {
                min-height: 100vh;
                margin: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1.5rem;
                background: #cda27a;
            }
            .logo-align-stage {
                padding: 2rem;
                background:
                    linear-gradient(45deg, rgba(0, 0, 0, 0.06) 25%, transparent 25%),
                    linear-gradient(-45deg, rgba(0, 0, 0, 0.06) 25%, transparent 25%),
                    linear-gradient(45deg, transparent 75%, rgba(0, 0, 0, 0.06) 75%),
                    linear-gradient(-45deg, transparent 75%, rgba(0, 0, 0, 0.06) 75%);
                background-size: 20px 20px;
                background-position: 0 0, 0 10px, 10px -10px, -10px 0;
                border-radius: 8px;
            }
            /* Show both logos stacked for comparison */
            html.logo-align .mr-logo-vector {
                opacity: 0.55 !important;
                z-index: 4;
            }
            html.logo-align .mr-logo-vector .mr-logo-path {
                stroke: #ff2d8a;
                stroke-width: 4px;
            }
            html.logo-align .mr-logo-glass {
                opacity: 1 !important;
            }
            html.logo-align .mr-logo-wrap {
                width: 110pt;
            }
            .logo-align-hint {
                max-width: 28rem;
                text-align: center;
                font: 14px/1.45 system-ui, sans-serif;
                color: #3d2024;
                margin: 0 1rem;
            }
            .logo-align-controls {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                padding: 12px 16px 20px;
                background: rgba(255, 252, 248, 0.96);
                border-top: 1px solid rgba(60, 30, 35, 0.15);
                font: 13px/1.4 system-ui, sans-serif;
                color: #2a1518;
                box-shadow: 0 -4px 24px rgba(40, 16, 24, 0.12);
            }
            .logo-align-controls h2 {
                margin: 0 0 8px;
                font-size: 14px;
                font-weight: 600;
            }
            .logo-align-row {
                display: grid;
                grid-template-columns: 72px 1fr 52px;
                align-items: center;
                gap: 8px;
                margin-bottom: 6px;
            }
            .logo-align-row input[type="range"] {
                width: 100%;
            }
            .logo-align-row output {
                text-align: right;
                font-variant-numeric: tabular-nums;
                font-size: 12px;
            }
            .logo-align-css {
                margin: 10px 0 0;
                padding: 8px 10px;
                background: #f3ebe3;
                border-radius: 6px;
                font: 12px/1.5 ui-monospace, monospace;
                word-break: break-all;
                user-select: all;
            }
            .logo-align-actions {
                margin-top: 8px;
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
            }
            .logo-align-actions button {
                font: inherit;
                padding: 6px 12px;
                border-radius: 6px;
                border: 1px solid rgba(60, 30, 35, 0.25);
                background: #fff;
                cursor: pointer;
            }
            .logo-align-actions button:hover {
                background: #f8f0e8;
            }
        </style>
    </head>
    <body>
        <p class="logo-align-hint">
            Pink outline = vector (dev mode). Glass layers on top. Adjust until strokes sit on the 3D edges, then copy the CSS block below into <code>.mr-logo-wrap</code> in <code>style.css</code>.
        </p>
        <div class="logo-align-stage">
            <div class="mr-logo-wrap" id="logo-wrap" role="img" aria-label="logo alignment preview">
                <svg class="mr-logo mr-logo-vector" viewBox="0 0 208 182" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path class="mr-logo-path" d="M103.902,5.868l-48.906,0l24.44,42.161l24.466,-14.089l0,-28.073Zm98.086,0l-48.932,0l-24.479,42.266l73.411,42.24l0,-84.505Zm0,169.271l0,-84.766l-73.49,42.318l24.583,42.448l48.906,0Zm-122.448,-42.37l-24.544,42.37l48.958,0l-0.026,-28.333l-24.388,-14.036Zm-73.672,42.37l49.128,0l24.544,-42.37l-73.672,-42.409l0,84.779Zm122.63,-42.448l-24.57,14.115l-24.388,-14.036l24.518,-42.279l24.44,42.201Z"/>
                </svg>
                <div class="mr-logo-glass" aria-hidden="true">
                    <img class="mr-logo-glass-layer mr-logo-glass-layer-shadow is-ready" src="../img/logo-3d-shadow.png" alt="" />
                    <img class="mr-logo-glass-layer mr-logo-glass-layer-beauty is-ready" src="../img/logo-3d-beauty.png" alt="" />
                    <img class="mr-logo-glass-layer mr-logo-glass-layer-spec is-ready" src="../img/logo-3d-spec.png" alt="" />
                </div>
            </div>
        </div>

        <div class="logo-align-controls">
            <h2>3D glass layer</h2>
            <label class="logo-align-row">
                <span>Scale</span>
                <input type="range" id="scale" min="0.85" max="1.25" step="0.005" value="1.115" />
                <output id="scale-out">1.115</output>
            </label>
            <label class="logo-align-row">
                <span>X (%)</span>
                <input type="range" id="x" min="-8" max="8" step="0.1" value="0.6" />
                <output id="x-out">0.6%</output>
            </label>
            <label class="logo-align-row">
                <span>Y (%)</span>
                <input type="range" id="y" min="-8" max="8" step="0.1" value="-0.4" />
                <output id="y-out">-0.4%</output>
            </label>
            <label class="logo-align-row">
                <span>Vector α</span>
                <input type="range" id="vector-alpha" min="0" max="100" step="1" value="55" />
                <output id="vector-alpha-out">55%</output>
            </label>
            <p class="logo-align-css" id="css-out"></p>
            <div class="logo-align-actions">
                <button type="button" id="copy-css">Copy CSS</button>
                <button type="button" id="reset">Reset defaults</button>
            </div>
        </div>

        <script>
            (function () {
                var wrap = document.getElementById("logo-wrap");
                var scale = document.getElementById("scale");
                var x = document.getElementById("x");
                var y = document.getElementById("y");
                var vectorAlpha = document.getElementById("vector-alpha");
                var cssOut = document.getElementById("css-out");
                var defaults = { scale: 1.115, x: 0.6, y: -0.4, vectorAlpha: 55 };

                function fmtPct(n) {
                    return (n % 1 === 0 ? String(n) : n.toFixed(1)) + "%";
                }

                function cssBlock() {
                    return (
                        "--logo-glass-scale: " + scale.value + ";\n" +
                        "--logo-glass-x: " + fmtPct(parseFloat(x.value)) + ";\n" +
                        "--logo-glass-y: " + fmtPct(parseFloat(y.value)) + ";"
                    );
                }

                function apply() {
                    wrap.style.setProperty("--logo-glass-scale", scale.value);
                    wrap.style.setProperty("--logo-glass-x", fmtPct(parseFloat(x.value)));
                    wrap.style.setProperty("--logo-glass-y", fmtPct(parseFloat(y.value)));
                    document.querySelector(".mr-logo-vector").style.opacity = parseInt(vectorAlpha.value, 10) / 100;

                    document.getElementById("scale-out").textContent = scale.value;
                    document.getElementById("x-out").textContent = fmtPct(parseFloat(x.value));
                    document.getElementById("y-out").textContent = fmtPct(parseFloat(y.value));
                    document.getElementById("vector-alpha-out").textContent = vectorAlpha.value + "%";
                    cssOut.textContent = ".mr-logo-wrap {\n    " + cssBlock().replace(/\n/g, "\n    ") + "\n}";
                }

                [scale, x, y, vectorAlpha].forEach(function (el) {
                    el.addEventListener("input", apply);
                });

                document.getElementById("copy-css").addEventListener("click", function () {
                    navigator.clipboard.writeText(cssOut.textContent).catch(function () {
                        window.prompt("Copy:", cssOut.textContent);
                    });
                });

                document.getElementById("reset").addEventListener("click", function () {
                    scale.value = defaults.scale;
                    x.value = defaults.x;
                    y.value = defaults.y;
                    vectorAlpha.value = defaults.vectorAlpha;
                    apply();
                });

                apply();
            })();
        </script>
    </body>
</html>
