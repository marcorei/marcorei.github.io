        <script>
            (function () {
                var path = window.location.pathname.replace(/\/$/, "") || "/";
                var host = window.location.hostname;
                var local = !host || host === "localhost" || host === "127.0.0.1";
                var colorful = path === "/3d";
                if (!colorful && local) {
                    colorful = new URL(window.location.href).searchParams.get("m") === "3d";

                var root = document.documentElement;
                if (colorful) {
                    root.classList.add("mode-colorful", "has-glass-logo");

        <script>
        (function () {
            var backgrounds = Array.prototype.slice.call(document.querySelectorAll(".mr-bg-animate"));
            var modeButtons = Array.prototype.slice.call(document.querySelectorAll(".mr-mode-btn"));
            var root = document.documentElement;
            function isLocalDev() {
                var host = window.location.hostname;
                return !host || host === "localhost" || host === "127.0.0.1";
            }

            function normalizedPath() {
                var path = window.location.pathname.replace(/\/$/, "");
                return path || "/";
            }

            function modeFromLocation() {
                if (normalizedPath() === "/3d") {
                    return "colorful";
                }
                if (isLocalDev()) {
                    var queryMode = new URL(window.location.href).searchParams.get("m");
                    if (queryMode === "3d") {
                        return "colorful";
                    }
                }
                return "blue";
            }

            function urlForMode(mode) {
                if (isLocalDev()) {
                    var localUrl = new URL(window.location.origin + "/");
                    if (mode === "colorful") {
                        localUrl.searchParams.set("m", "3d");
                    } else {
                        localUrl.searchParams.set("m", "dev");
                    }
                    return localUrl;
                }
                return new URL(window.location.origin + (mode === "colorful" ? "/3d" : "/"));
            }

            var resizeTimer;
            function restartBgAnimation() {
                backgrounds.forEach(function (bg) {
                    bg.classList.remove("mr-bg-animate");
                    void bg.getBoundingClientRect();
                    bg.classList.add("mr-bg-animate");
                });
            }

            window.addEventListener("resize", function () {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(restartBgAnimation, 180);
            }, { passive: true });

            function syncModeUrl(mode, usePushState) {
                var url = urlForMode(mode);
                var href = url.pathname + url.search;
                if (usePushState) {
                    window.history.pushState({ mode: mode }, "", href);
                } else {
                    window.history.replaceState({ mode: mode }, "", href);
                }
            }

            var MODE_TRANSITION_MS = 480;
            var modeTransitionTimer;

            function endModeTransition() {
                root.classList.remove("mode-transitioning");
            }

            function applyMode(mode) {
                root.classList.toggle("mode-blue", mode === "blue");
                root.classList.toggle("mode-colorful", mode === "colorful");
                root.classList.toggle("has-glass-logo", mode === "colorful");

                modeButtons.forEach(function (candidate) {
                    var active = candidate.getAttribute("data-mode") === mode;
                    candidate.classList.toggle("is-active", active);
                    candidate.setAttribute("aria-pressed", active ? "true" : "false");
                });
            }

            function setMode(mode) {
                clearTimeout(modeTransitionTimer);
                root.classList.add("mode-transitioning");
                applyMode(mode);

                modeTransitionTimer = setTimeout(function () {
                    endModeTransition();
                }, MODE_TRANSITION_MS);
            }

            var initialMode = modeFromLocation();
            applyMode(initialMode);
            syncModeUrl(initialMode, false);
            requestAnimationFrame(function () {
                root.classList.remove("mode-init");
            });

            modeButtons.forEach(function (button) {
                button.addEventListener("click", function () {
                    var mode = button.getAttribute("data-mode");
                    if (mode === modeFromLocation()) {
                        return;
                    }
                    setMode(mode);
                    syncModeUrl(mode, true);
                });
            });

            window.addEventListener("popstate", function () {
                setMode(modeFromLocation());
            });
        })();
        </script>
